name: bebekb
description: "i love mY bebekb"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Security & Auth
  crypto: ^3.0.3                    # SHA-256 hashing
  local_auth: ^2.1.8                # Biometric/fingerprint
  shared_preferences: ^2.2.2       # Session management
  flutter_secure_storage: ^9.0.0   # Secure token storage

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Sensors
  sensors_plus: ^4.0.2              # Accelerometer + Gyroscope
  light_sensor: ^2.0.0             # Light sensor

  # Notifications
  flutter_local_notifications: ^16.3.2

  # UI / Material 3
  flex_color_scheme: ^7.3.1        # Advanced M3 theming
  google_fonts: ^6.1.0
  lottie: ^3.0.0                   # Animasi
  fl_chart: ^0.66.2                # Charts & grafik
  shimmer: ^3.0.0                  # Loading skeleton

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0                    # Formatting tanggal & angka
  uuid: ^4.3.3
  get_it: ^7.6.7                   # Dependency injection

  # AI/Chatbot
  dart_openai: ^4.1.0             # OpenAI API wrapper

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.0
  bloc_test: ^9.1.5